<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 532" width="900" height="532">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f2439"/>
    </linearGradient>
  </defs>
  <rect width="900" height="532" fill="url(#bg)"/>
  <!-- Treiber-Gehäuse -->
  <rect x="300" y="160" width="300" height="120" rx="8" fill="#2d4a6f" stroke="#4a7ab5" stroke-width="2"/>
  <rect x="310" y="170" width="280" height="100" rx="4" fill="#1a3352"/>
  <!-- Bauteile angedeutet -->
  <rect x="330" y="195" width="40" height="50" rx="3" fill="#3b6ea8" opacity="0.7"/>
  <rect x="380" y="205" width="25" height="30" rx="2" fill="#4a7ab5" opacity="0.6"/>
  <circle cx="430" cy="220" r="18" fill="none" stroke="#4a7ab5" stroke-width="2" opacity="0.7"/>
  <rect x="460" y="195" width="50" height="50" rx="3" fill="#3b6ea8" opacity="0.7"/>
  <rect x="520" y="200" width="20" height="40" rx="2" fill="#4a7ab5" opacity="0.6"/>
  <rect x="550" y="210" width="30" height="25" rx="2" fill="#3b6ea8" opacity="0.6"/>
  <!-- Eingang -->
  <line x1="200" y1="220" x2="300" y2="220" stroke="#e6a532" stroke-width="3"/>
  <text x="210" y="210" fill="#e6a532" font-family="Arial, sans-serif" font-size="14" font-weight="bold">AC 230V</text>
  <!-- Ausgang -->
  <line x1="600" y1="220" x2="700" y2="220" stroke="#5cb85c" stroke-width="3"/>
  <text x="620" y="210" fill="#5cb85c" font-family="Arial, sans-serif" font-size="14" font-weight="bold">DC LED</text>
  <!-- LED Symbol -->
  <polygon points="720,200 720,240 750,220" fill="#5cb85c" opacity="0.8"/>
  <line x1="750" y1="200" x2="750" y2="240" stroke="#5cb85c" stroke-width="2"/>
  <!-- Glow -->
  <circle cx="750" cy="220" r="30" fill="#5cb85c" opacity="0.1"/>
  <circle cx="750" cy="220" r="20" fill="#5cb85c" opacity="0.15"/>
  <!-- PF Anzeige -->
  <text x="450" y="340" fill="#8badd4" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">Power Factor PF ≥ 0,95</text>
  <!-- Prüfzeichen -->
  <text x="370" y="380" fill="#6b8db5" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">CE</text>
  <rect x="350" y="365" width="40" height="22" rx="3" fill="none" stroke="#6b8db5" stroke-width="1.5"/>
  <text x="450" y="380" fill="#6b8db5" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">TÜV</text>
  <rect x="425" y="365" width="50" height="22" rx="3" fill="none" stroke="#6b8db5" stroke-width="1.5"/>
  <text x="540" y="380" fill="#6b8db5" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">ENEC</text>
  <rect x="510" y="365" width="60" height="22" rx="3" fill="none" stroke="#6b8db5" stroke-width="1.5"/>
  <!-- Titel -->
  <text x="450" y="460" fill="white" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">LED-Treiber: Das Herzstück jeder Leuchte</text>
</svg>
